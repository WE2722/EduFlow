<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EduFlow Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(120deg, #0f172a, #1d4ed8); min-height: 100vh; display: grid; place-items: center; }
        .login-card { width: min(430px, 92vw); border-radius: 16px; }
    </style>
</head>
<body>
<div class="card shadow login-card">
    <div class="card-body p-4">
        <h1 class="h4 mb-3">EduFlow Login</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100" type="submit">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
