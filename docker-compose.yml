services:
  db:
    image: postgres:16-alpine
    container_name: eduflow_db
    environment:
      POSTGRES_DB: eduflow
      POSTGRES_USER: eduflow
      POSTGRES_PASSWORD: eduflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: eduflow_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "true"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: eduflow
      DB_USER: eduflow
      DB_PASSWORD: eduflow
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      - db

volumes:
  postgres_data:
